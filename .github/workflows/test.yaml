name: Test the actions

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-action-code:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v5
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'pnpm'
    - name: Install dependencies
      run: pnpm install
    - name: Check the formatting
      run: pnpm format-check
    - name: Lint the code
      run: pnpm lint
    - name: Run the unit tests
      run: pnpm test
    - name: Try to package code
      run: pnpm build
    - name: Ensure packaged code is committed
      run: git diff --exit-code

  run-rockcraft-pack-action:
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04]
        revision: ['1206', '']
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v5
    - name: Build a rock
      uses: ./rockcraft-pack
      id: rockcraft
      with:
        path: tests
        verbosity: debug
        revision: ${{ matrix.revision }}
    - name: Assert revision number
      if: matrix.revision != ''
      run: |
        set -ex
        installed_rev="$(snap info rockcraft | tail -1 | awk '{print $(NF-2)}')"
        [ "$installed_rev" == "(${{ matrix.revision }})" ]
    - name: Upload rock
      uses: actions/upload-artifact@v7
      with:
        name: test-rock-${{ matrix.os }}-${{ matrix.revision }}
        path: ${{ steps.rockcraft.outputs.rock }}

  run-rockcraft-pack-action-legacy-rock:
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Build a legacy rock
        uses: ./rockcraft-pack
        id: rockcraft
        with:
          path: tests/legacy
          verbosity: debug
          ignore: 'unmaintained'
      - name: Upload legacy rock
        uses: actions/upload-artifact@v7
        with:
          name: test-legacy-rock-${{ matrix.os }}
          path: ${{ steps.rockcraft.outputs.rock }}
